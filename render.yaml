services:
  - type: web
    name: kontainer-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kontainer-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "1337"
      - key: PUBLIC_URL
        value: https://kontainer.onrender.com
      - key: FRONTEND_URL
        value: https://kontainer-flame.vercel.app
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true

databases:
  - name: kontainer-db
    databaseName: kontainer
    user: kontainer
    plan: free
